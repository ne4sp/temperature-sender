<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Температура</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div>
          <h1>Температура</h1>
          <div class="sub">Онлайн‑мониторинг с ESP32</div>
        </div>
        <div class="badge" id="statusBadge">offline</div>
      </header>

      <section class="cards">
        <div class="card">
          <div class="label">Текущее значение</div>
          <div class="value" id="currentValue">—</div>
          <div class="hint" id="currentMeta">—</div>
        </div>
        <div class="card">
          <div class="label">Влажность</div>
          <div class="value" id="currentHumidity">—</div>
          <div class="hint">Если датчик её отправляет</div>
        </div>
        <div class="card">
          <div class="label">Точек в истории</div>
          <div class="value" id="pointsCount">0</div>
          <div class="hint">Ограничение на сервере: <span id="limitHint">1000</span></div>
        </div>
      </section>

      <section class="card chartCard">
        <div class="label">Температура</div>
        <div class="chartWrap">
          <canvas id="tempChart"></canvas>
        </div>
      </section>

      <section class="card chartCard">
        <div class="label">Влажность</div>
        <div class="chartWrap">
          <canvas id="humChart"></canvas>
        </div>
      </section>

      <section class="card">
        <div class="label">Как отправлять с ESP32</div>
        <pre class="code" id="exampleCurl"></pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
